<script>
document.addEventListener("DOMContentLoaded", function () {
  var sidebar = document.getElementById("quarto-margin-sidebar");
  var formats = document.querySelector(".quarto-alternate-formats");
  if (sidebar && formats) {
    sidebar.insertBefore(formats, sidebar.firstChild);
  }

  // Rename "Typst" label to "PDF"
  document.querySelectorAll(".quarto-alternate-formats a").forEach(function (a) {
    a.childNodes.forEach(function (node) {
      if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() === "Typst") {
        node.textContent = "PDF";
      }
    });
  });
});
</script>
